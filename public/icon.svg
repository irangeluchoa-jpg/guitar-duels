<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#0d1117"/>
  <!-- Guitarras cruzadas - silhueta simplificada -->
  <!-- Guitarra esquerda (inclinada /) -->
  <g transform="rotate(-40, 50, 50)" fill="#38bdf8">
    <!-- corpo -->
    <ellipse cx="36" cy="68" rx="14" ry="11"/>
    <ellipse cx="28" cy="72" rx="8" ry="7"/>
    <!-- pickguard -->
    <rect x="26" y="60" width="12" height="5" rx="1" fill="#0d1117"/>
    <!-- pescoço -->
    <rect x="33" y="20" width="7" height="52" rx="3"/>
    <!-- cabeça -->
    <rect x="31" y="13" width="11" height="10" rx="3"/>
    <!-- cravelhas -->
    <rect x="28" y="14" width="4" height="2" rx="1"/>
    <rect x="28" y="17" width="4" height="2" rx="1"/>
    <rect x="28" y="20" width="4" height="2" rx="1"/>
    <rect x="41" y="14" width="4" height="2" rx="1"/>
    <rect x="41" y="17" width="4" height="2" rx="1"/>
  </g>
  <!-- Guitarra direita (inclinada \) -->
  <g transform="rotate(40, 50, 50)" fill="#38bdf8">
    <ellipse cx="64" cy="68" rx="14" ry="11"/>
    <ellipse cx="72" cy="72" rx="8" ry="7"/>
    <rect x="62" y="60" width="12" height="5" rx="1" fill="#0d1117"/>
    <rect x="60" y="20" width="7" height="52" rx="3"/>
    <rect x="58" y="13" width="11" height="10" rx="3"/>
    <rect x="56" y="14" width="4" height="2" rx="1"/>
    <rect x="56" y="17" width="4" height="2" rx="1"/>
    <rect x="56" y="20" width="4" height="2" rx="1"/>
    <rect x="69" y="14" width="4" height="2" rx="1"/>
    <rect x="69" y="17" width="4" height="2" rx="1"/>
  </g>
  <!-- Estrela central -->
  <polygon points="50,78 51.5,83 57,83 52.5,86 54,91 50,88 46,91 47.5,86 43,83 48.5,83" fill="#38bdf8"/>
</svg>